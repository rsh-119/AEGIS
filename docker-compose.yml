name: aegis

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER:     aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB:       aegis
    ports:
      - "5433:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - aegis_redis:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis@db:5432/aegis
      REDIS_URL:    redis://redis:6379
      APP_ENV:      production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout:  5s
      retries:  3
    restart: unless-stopped

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  aegis_pgdata:
  aegis_redis:
