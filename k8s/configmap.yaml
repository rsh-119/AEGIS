apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  APP_ENV:              "production"
  LOG_LEVEL:            "INFO"
  REDIS_URL:            "redis://aegis-redis:6379"
  READONLY_MODE:        "false"
  RATE_LIMIT_ENABLED:   "true"
  AI_TIMEOUT_SECONDS:   "60"
  CORS_ORIGINS:         "https://yourdomain.com"
