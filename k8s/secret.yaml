# !! NEVER commit real values to git !!
# Create this secret manually:
#
#   kubectl create secret generic aegis-secrets -n aegis \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://user:pass@host/aegis" \
#     --from-literal=GROQ_API_KEY="gsk_..." \
#     --from-literal=NVIDIA_API_KEY="nvapi-..." \
#     --from-literal=INDIANAPI_KEY="sk-live-..." \
#     --from-literal=REDIS_URL="redis://aegis-redis:6379"
#
# Or use a secrets manager (Vault, AWS Secrets Manager, GCP Secret Manager).
# The template below is for reference only — values are placeholders.

apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegis
type: Opaque
stringData:
  DATABASE_URL:      "postgresql+asyncpg://aegis:CHANGE_ME@aegis-postgres:5432/aegis"
  GROQ_API_KEY:      "CHANGE_ME"
  NVIDIA_API_KEY:    "CHANGE_ME"
  INDIANAPI_KEY:     "CHANGE_ME"
  OPENROUTER_API_KEY: ""
