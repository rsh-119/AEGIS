global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    service: aegis

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerting_rules.yml"

scrape_configs:
  # ── Aegis backend ────────────────────────────────────────────────────────────
  - job_name: aegis-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
